<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒ログ Pro</title>
    <style>
        :root { --main: #d4a373; --bg: #fdfaf5; --text: #333; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .sticky-nav { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        .search-box { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--main); font-size: 16px; box-sizing: border-box; outline: none; }
        .card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .region-tag { display: inline-block; background: var(--main); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 5px; }
        .brand-name { font-size: 1.2rem; font-weight: bold; margin: 0 0 5px 0; }
        .info-box { background: #f8f9fa; border-radius: 6px; padding: 10px; font-size: 0.85rem; line-height: 1.4; border-left: 3px solid #ccc; }
        .memo-area { width: 100%; min-height: 80px; margin-top: 10px; border: 1px solid #ddd; border-radius: 6px; padding: 10px; font-size: 16px; box-sizing: border-box; }
        .status { font-size: 0.7rem; color: #888; text-align: right; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="sticky-nav">
    <input type="text" id="search" class="search-box" placeholder="スプシ読込中..." oninput="filter()" disabled>
</div>

<div id="container"></div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycby03KjHCW9eB9UXLmd4CCiBwRL75P-UsFjyCyraqZ49PCGZeuO_1YE-0FA3k2t3MAIzFQ/exec";
    let sakeData = [];

    async function init() {
        const response = await fetch(gasUrl);
        sakeData = await response.json();
        render();
        document.getElementById('search').disabled = false;
        document.getElementById('search').placeholder = "検索...";
    }

    function render() {
        const container = document.getElementById('container');
        container.innerHTML = "";
        
        sakeData.forEach((d, index) => {
            const region = d["地域"] || "";
            const brand = d["銘柄"] || "";
            const brewery = d["酒造"] ? `（${d["酒造"]}）` : ""; // 酒造が空ならカッコも出さない
            const recom = d["おすすめの酒"] || "";
            const desc = d["特徴"] || "";
            const initialMemo = d["メモ"] || localStorage.getItem(brand) || "";

            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-search', `${region} ${brand} ${brewery}`);
            card.innerHTML = `
                <div class="region-tag">${region}</div>
                <h2 class="brand-name">${brand}${brewery}</h2>
                <div class="info-box"><strong>${recom}</strong><br>${desc}</div>
                <textarea class="memo-area" placeholder="感想をメモ..." onchange="syncMemo('${brand}', this)">${initialMemo}</textarea>
                <div class="status" id="st-${brand}"></div>
            `;
            container.appendChild(card);
        });
    }

    // スプシと同期する関数
    async function syncMemo(brand, el) {
        const memo = el.value;
        const statusEl = document.getElementById(`st-${brand}`);
        statusEl.innerText = "同期中...";
        
        // ローカルにも保存
        localStorage.setItem(brand, memo);

        try {
            // GASにデータを送信（GETリクエスト）
            await fetch(`${gasUrl}?brand=${encodeURIComponent(brand)}&memo=${encodeURIComponent(memo)}`, { mode: 'no-cors' });
            statusEl.innerText = "スプシに保存しました";
        } catch (e) {
            statusEl.innerText = "保存失敗(オフライン)";
        }
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.classList.toggle('hidden', !c.getAttribute('data-search').toLowerCase().includes(q));
        });
    }

    init();
</script>
</body>
</html>
